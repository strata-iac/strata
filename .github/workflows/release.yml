# Release workflow for @procella/migrate
#
# Uses the same GitHub App as Renovate for authentication.
# A GitHub App is preferred over a PAT: permissions are scoped to the app,
# tokens are short-lived, and commits show as the app (not a personal account).
# Critically, PRs opened by GitHub Apps trigger CI workflows — unlike the
# default GITHUB_TOKEN which creates PRs that skip other workflow triggers.
#
# Prerequisites (shared with Renovate):
#   1. GitHub App with permissions: contents: write, pull_requests: write
#   2. App installed on the procella-dev org / procella repo
#   3. Secrets: RENOVATE_APP_ID, RENOVATE_APP_PRIVATE_KEY
#      (reuses the same secrets — no new app needed)
name: Release

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      migrate_released: ${{ steps.release.outputs['packages/migrate--release_created'] }}
      migrate_tag: ${{ steps.release.outputs['packages/migrate--tag_name'] }}
    steps:
      - name: Get GitHub App token
        id: get_token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.RENOVATE_APP_ID }}
          private-key: ${{ secrets.RENOVATE_APP_PRIVATE_KEY }}

      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ steps.get_token.outputs.token }}

  publish-migrate:
    name: Publish @procella/migrate
    runs-on: ubuntu-latest
    needs: [release-please]
    if: needs.release-please.outputs.migrate_released == 'true'
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: ./.github/actions/setup-bun

      - name: Verify quality gates
        run: |
          bunx biome check packages/migrate/
          bun run typecheck
          bun test packages/migrate/

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Build for distribution
        working-directory: packages/migrate
        run: |
          bunx tsc --outDir dist
          # Generate a publish-ready package.json with compiled paths
          bun -e '
            const pkg = require("./package.json");
            const dist = {
              name: pkg.name,
              version: pkg.version,
              description: pkg.description,
              type: pkg.type,
              license: pkg.license,
              repository: pkg.repository,
              keywords: pkg.keywords,
              engines: pkg.engines,
              bin: { "procella-migrate": "cli.js" },
              main: "index.js",
              types: "index.d.ts",
              exports: { ".": { import: "./index.js", types: "./index.d.ts" } },
            };
            require("fs").writeFileSync("dist/package.json", JSON.stringify(dist, null, 2));
          '
          cp -f ../../LICENSE dist/ 2>/dev/null || true

      - name: Publish to npm
        working-directory: packages/migrate/dist
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
