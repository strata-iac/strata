name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint, Typecheck & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      - run: bun run check

  e2e:
    name: E2E Acceptance Tests
    runs-on: ubuntu-latest
    needs: [check]
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: procella
          POSTGRES_PASSWORD: procella
          POSTGRES_DB: procella
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U procella"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - uses: pulumi/setup-pulumi@v2
      - run: bun install --frozen-lockfile
      - name: Run E2E tests
        env:
          PROCELLA_DATABASE_URL: postgres://procella:procella@localhost:5432/procella?sslmode=disable
        run: bun run e2e

  e2e-cluster:
    name: E2E Cluster Tests
    runs-on: ubuntu-latest
    needs: [check]
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - uses: pulumi/setup-pulumi@v2
      - run: bun install --frozen-lockfile
      - name: Start cluster
        run: docker compose --profile cluster up --build -d
      - name: Wait for cluster to be healthy
        run: |
          echo "Waiting for Caddy (port 9090)..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:9090/healthz > /dev/null 2>&1; then
              echo "Cluster is healthy!"
              exit 0
            fi
            echo "  attempt $i/60..."
            sleep 5
          done
          echo "Cluster failed to become healthy"
          docker compose --profile cluster logs --tail=50
          exit 1
      - name: Run E2E tests against cluster
        env:
          PROCELLA_DATABASE_URL: postgres://procella:procella@localhost:5432/procella?sslmode=disable
        run: bun run e2e
      - name: Cluster logs (on failure)
        if: failure()
        run: docker compose --profile cluster logs --tail=100
      - name: Stop cluster
        if: always()
        run: docker compose --profile cluster down -v
