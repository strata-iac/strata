name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint, Typecheck & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - uses: actions/cache@v5
        with:
          path: |
            node_modules
            ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      - run: bun run check

  types-freshness:
    name: Verify Pulumi Types Freshness
    runs-on: ubuntu-latest
    # Runs on all PRs as a safety net to catch stale generated types
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - uses: actions/setup-go@v6
        with:
          go-version-file: packages/types/tygo/go.mod
          cache-dependency-path: packages/types/tygo/go.sum
      - uses: actions/cache@v5
        with:
          path: |
            node_modules
            ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      - name: Regenerate types from Pulumi SDK
        run: bun run types:generate
      - name: Check for uncommitted type changes
        run: |
          if ! git diff --exit-code packages/types/; then
            echo ""
            echo "::error::Generated Pulumi types are stale. Run 'bun run types:generate' and commit the result."
            echo ""
            echo "The Pulumi SDK version in go.mod was updated but the generated types were not regenerated."
            echo "This can cause type mismatches between the Go SDK and TypeScript interfaces."
            exit 1
          fi
      - name: Typecheck with regenerated types
        run: bun run typecheck
      - name: Run unit tests
        run: bun test packages/

  e2e:
    name: E2E Acceptance Tests
    runs-on: ubuntu-latest
    needs: [check]
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: procella
          POSTGRES_PASSWORD: procella
          POSTGRES_DB: procella
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U procella"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - uses: actions/cache@v5
        with:
          path: |
            node_modules
            ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - uses: pulumi/setup-pulumi@v2
      - run: bun install --frozen-lockfile
      - name: Run E2E tests
        env:
          PROCELLA_DATABASE_URL: postgres://procella:procella@localhost:5432/procella?sslmode=disable
        run: bun run e2e

  bench:
    name: Performance Benchmark
    runs-on: ubuntu-latest
    needs: [check]
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: procella
          POSTGRES_PASSWORD: procella
          POSTGRES_DB: procella
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U procella"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - uses: actions/cache@v5
        with:
          path: |
            node_modules
            ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - uses: pulumi/setup-pulumi@v2
      - run: bun install --frozen-lockfile
      - name: Run benchmark
        env:
          PROCELLA_DATABASE_URL: postgres://procella:procella@localhost:5432/procella?sslmode=disable
        run: BENCH_MODES=journal BENCH_VARIANTS=secrets BENCH_SIZES=100 BENCH_TRIALS=10 bun run bench
      - name: Check benchmark thresholds
        run: bun run bench:check
      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: bench/results.json
