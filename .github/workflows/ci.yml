name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint, Typecheck & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - uses: actions/cache@v5
        with:
          path: |
            node_modules
            ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      - run: bun run check

  types-freshness:
    name: Verify Pulumi Types Freshness
    runs-on: ubuntu-latest
    # Runs on all PRs as a safety net to catch stale generated types
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - uses: actions/setup-go@v6
        with:
          go-version-file: packages/types/tygo/go.mod
          cache-dependency-path: packages/types/tygo/go.sum
      - uses: actions/cache@v5
        with:
          path: |
            node_modules
            ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      - name: Regenerate types from Pulumi SDK
        run: bun run types:generate
      - name: Check for uncommitted type changes
        run: |
          if ! git diff --exit-code packages/types/; then
            echo ""
            echo "::error::Generated Pulumi types are stale. Run 'bun run types:generate' and commit the result."
            echo ""
            echo "The Pulumi SDK version in go.mod was updated but the generated types were not regenerated."
            echo "This can cause type mismatches between the Go SDK and TypeScript interfaces."
            exit 1
          fi
      - name: Typecheck with regenerated types
        run: bun run typecheck
      - name: Run unit tests
        run: bun test packages/

  e2e:
    name: E2E Acceptance Tests
    runs-on: ubuntu-latest
    needs: [check]
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: procella
          POSTGRES_PASSWORD: procella
          POSTGRES_DB: procella
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U procella"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      jaeger:
        image: jaegertracing/all-in-one:1
        env:
          COLLECTOR_OTLP_ENABLED: "true"
        ports:
          - 4318:4318
          - 16686:16686
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - uses: actions/cache@v5
        with:
          path: |
            node_modules
            ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - uses: pulumi/setup-pulumi@v2
      - run: bun install --frozen-lockfile
      - name: Run E2E tests
        env:
          PROCELLA_DATABASE_URL: postgres://procella:procella@localhost:5432/procella?sslmode=disable
          PROCELLA_OTEL_ENABLED: "true"
          OTEL_SERVICE_NAME: procella-ci-e2e
          OTEL_EXPORTER_OTLP_ENDPOINT: http://localhost:4318
          OTEL_RESOURCE_ATTRIBUTES: deployment.environment=ci,vcs.revision=${{ github.sha }},ci.run_id=${{ github.run_id }}
        run: bun run e2e
      - name: Analyze E2E traces
        if: always()
        env:
          OTEL_SERVICE_NAME: procella-ci-e2e
        run: bun run bench/analyze-traces.ts

  e2e-ui:
    name: E2E UI Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [check]
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: procella
          POSTGRES_PASSWORD: procella
          POSTGRES_DB: procella
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U procella"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - uses: actions/cache@v5
        with:
          path: |
            node_modules
            ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - uses: pulumi/setup-pulumi@v2
      - run: bun install --frozen-lockfile
      - name: Install Playwright browsers
        run: bunx playwright install chromium --with-deps
      - name: Run Playwright UI tests
        env:
          CI: "true"
          PROCELLA_DATABASE_URL: postgres://procella:procella@localhost:5432/procella?sslmode=disable
          PROCELLA_DEV_AUTH_TOKEN: devtoken123
          PLAYWRIGHT_API_URL: http://localhost:18080
          PLAYWRIGHT_BASE_URL: http://localhost:5173
          VITE_API_PORT: "18080"
        run: bun run e2e:ui
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  bench:
    name: Performance Benchmark
    runs-on: ubuntu-latest
    needs: [check]
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: procella
          POSTGRES_PASSWORD: procella
          POSTGRES_DB: procella
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U procella"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      jaeger:
        image: jaegertracing/all-in-one:1
        env:
          COLLECTOR_OTLP_ENABLED: "true"
        ports:
          - 4318:4318
          - 16686:16686
        options: >-
          --health-cmd "wget -q --spider http://localhost:14269/ || exit 1"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - uses: actions/cache@v5
        with:
          path: |
            node_modules
            ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - uses: pulumi/setup-pulumi@v2
      - run: bun install --frozen-lockfile
      - name: Run benchmark
        env:
          PROCELLA_DATABASE_URL: postgres://procella:procella@localhost:5432/procella?sslmode=disable
          PROCELLA_OTEL_ENABLED: "true"
          OTEL_SERVICE_NAME: procella-ci-bench
          OTEL_EXPORTER_OTLP_ENDPOINT: http://localhost:4318
          OTEL_RESOURCE_ATTRIBUTES: deployment.environment=ci,vcs.revision=${{ github.sha }},ci.run_id=${{ github.run_id }}
        run: BENCH_MODES=journal BENCH_VARIANTS=secrets BENCH_SIZES=100 BENCH_TRIALS=10 bun run bench
      - name: Check benchmark thresholds
        run: bun run bench:check
      - name: Analyze traces
        if: always()
        run: bun run bench/analyze-traces.ts
      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-results
          path: bench/results.json
