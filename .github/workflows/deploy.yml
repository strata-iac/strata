name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      stage:
        description: "SST stage to deploy"
        required: true
        type: choice
        options:
          - production
          - dev
      ref:
        description: "Git ref to deploy (tag, branch, or SHA). Defaults to current default branch HEAD."
        required: false

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-${{ inputs.stage || 'dev' }}
  cancel-in-progress: ${{ (inputs.stage || 'dev') != 'production' }}

jobs:
  deploy:
    uses: ./.github/workflows/deploy-sst.yml
    permissions:
      id-token: write
      contents: read
    with:
      stage: ${{ inputs.stage || 'dev' }}
      ref: ${{ inputs.ref || '' }}
    secrets: inherit
