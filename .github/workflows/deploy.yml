name: Deploy Production

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to deploy (tag, branch, or SHA). Defaults to current default branch HEAD."
        required: false

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    uses: ./.github/workflows/deploy-sst.yml
    permissions:
      id-token: write
      contents: read
    with:
      stage: production
      environment: production
      ref: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.ref || '' }}
    secrets: inherit
