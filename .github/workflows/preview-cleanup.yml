name: Preview Cleanup

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: read

concurrency:
  group: preview-${{ github.event.number }}

env:
  NEON_PROJECT_ID: ${{ vars.NEON_PROJECT_ID }}
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
  PULUMI_BACKEND_URL: s3://procella-pulumi-state?endpoint=${{ secrets.R2_ENDPOINT }}&region=auto
  AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}

jobs:
  # ── Delete Neon branch ────────────────────────────────────────────────────
  neon:
    name: Delete Neon Branch
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: neondatabase/delete-branch-action@v3
        with:
          project_id: ${{ env.NEON_PROJECT_ID }}
          branch: preview/pr-${{ github.event.number }}
          api_key: ${{ secrets.NEON_API_KEY }}

  # ── Destroy Pulumi preview stack ─────────────────────────────────────────
  infra:
    name: Destroy Pulumi Stack
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - uses: actions/cache@v5
        with:
          path: |
            node_modules
            ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      - run: bun install --frozen-lockfile
        working-directory: infra
      - uses: pulumi/actions@v6
        with:
          command: destroy
          stack-name: preview-pr-${{ github.event.number }}
          work-dir: infra
        env:
          PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}
      - name: Remove stack
        run: cd infra && pulumi stack rm preview-pr-${{ github.event.number }} --yes
        env:
          PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}

  # ── Remove Vercel preview deployments ────────────────────────────────────
  vercel-app:
    name: Remove App Preview
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Remove PR deployments
        env:
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          # Find deployments for this PR's branch via Vercel API
          BRANCH="${{ github.head_ref }}"
          DEPLOYS=$(curl -s -H "Authorization: Bearer $VERCEL_TOKEN" \
            "https://api.vercel.com/v6/deployments?projectId=$VERCEL_PROJECT_ID&meta-githubCommitRef=$BRANCH&limit=10" \
            | jq -r '.deployments[].uid // empty')
          for uid in $DEPLOYS; do
            echo "Removing deployment $uid"
            curl -s -X DELETE -H "Authorization: Bearer $VERCEL_TOKEN" \
              "https://api.vercel.com/v13/deployments/$uid" || true
          done

  vercel-docs:
    name: Remove Docs Preview
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Remove PR deployments
        env:
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_DOCS_PROJECT_ID }}
        run: |
          # Find deployments for this PR's branch via Vercel API
          BRANCH="${{ github.head_ref }}"
          DEPLOYS=$(curl -s -H "Authorization: Bearer $VERCEL_TOKEN" \
            "https://api.vercel.com/v6/deployments?projectId=$VERCEL_PROJECT_ID&meta-githubCommitRef=$BRANCH&limit=10" \
            | jq -r '.deployments[].uid // empty')
          for uid in $DEPLOYS; do
            echo "Removing deployment $uid"
            curl -s -X DELETE -H "Authorization: Bearer $VERCEL_TOKEN" \
              "https://api.vercel.com/v13/deployments/$uid" || true
          done