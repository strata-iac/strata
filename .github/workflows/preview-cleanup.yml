name: Preview Cleanup

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  id-token: write
  contents: read

concurrency:
  group: preview-${{ github.event.number }}

jobs:
  cleanup:
    name: Remove Preview Stack
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: preview
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - uses: actions/cache@v5
        with:
          path: |
            node_modules
            ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1
          role-session-name: GitHubActions-Cleanup-${{ github.run_id }}

      - name: Drop stage database
        continue-on-error: true
        shell: bash {0}
        run: |
          set -x
          STAGE="pr-${{ github.event.number }}"
          DB_NAME="procella_${STAGE//-/_}"
          CLUSTER_ID=$(aws rds describe-db-clusters \
            --query "DBClusters[?starts_with(DBClusterIdentifier, 'procella')].DBClusterIdentifier | [0]" \
            --output text)
          if [ -z "$CLUSTER_ID" ] || [ "$CLUSTER_ID" = "None" ]; then
            echo "No Aurora cluster found — skipping cleanup"
            exit 0
          fi
          CLUSTER_ARN=$(aws rds describe-db-clusters --db-cluster-identifier "$CLUSTER_ID" \
            --query "DBClusters[0].DBClusterArn" --output text)
          SECRET_ARN=$(aws rds describe-db-clusters --db-cluster-identifier "$CLUSTER_ID" \
            --query "DBClusters[0].MasterUserSecret.SecretArn" --output text)
          aws rds-data execute-statement \
            --resource-arn "$CLUSTER_ARN" \
            --secret-arn "$SECRET_ARN" \
            --database "postgres" \
            --sql "DROP DATABASE IF EXISTS \"$DB_NAME\"" 2>&1 || true

      - name: Remove SST stack
        run: npx sst remove --stage pr-${{ github.event.number }}
        continue-on-error: true

      - name: Cleanup summary
        if: always()
        run: |
          echo "## Preview Cleanup" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | \`pr-${{ github.event.number }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | \`${{ job.status }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| PR | #${{ github.event.number }} |" >> $GITHUB_STEP_SUMMARY
