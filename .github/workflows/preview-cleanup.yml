name: Preview Cleanup

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  id-token: write
  contents: read

concurrency:
  group: preview-${{ github.event.number }}

jobs:
  cleanup:
    name: Remove Preview Stack
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: preview
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - uses: actions/cache@v5
        with:
          path: |
            node_modules
            ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1
          role-session-name: GitHubActions-Cleanup-${{ github.run_id }}

      - name: Remove SST stack
        run: npx sst remove --stage pr-${{ github.event.number }}
        continue-on-error: true

      - name: Cleanup summary
        if: always()
        run: |
          echo "## Preview Cleanup" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | \`pr-${{ github.event.number }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | \`${{ job.status }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| PR | #${{ github.event.number }} |" >> $GITHUB_STEP_SUMMARY
