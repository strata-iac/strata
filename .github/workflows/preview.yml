name: Preview Environment

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [main]

permissions:
  id-token: write
  contents: read
  pull-requests: write

concurrency:
  group: preview-${{ github.event.number }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy Preview
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: preview
    outputs:
      api_url: ${{ steps.outputs.outputs.api }}
      app_url: ${{ steps.outputs.outputs.app }}
      docs_url: ${{ steps.outputs.outputs.docs }}
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - uses: actions/cache@v5
        with:
          path: |
            node_modules
            ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1
          role-session-name: GitHubActions-Preview-${{ github.run_id }}

      - name: Set SST secrets for preview stage
        env:
          STAGE: pr-${{ github.event.number }}
        run: |
          npx sst secret set ProcellaEncryptionKey "${{ secrets.PROCELLA_ENCRYPTION_KEY }}" --stage "$STAGE"
          npx sst secret set ProcellaDevAuthToken "${{ secrets.PROCELLA_DEV_AUTH_TOKEN }}" --stage "$STAGE"
          npx sst secret set ProcellaDescopeProjectId "${{ secrets.DESCOPE_PROJECT_ID }}" --stage "$STAGE"
          npx sst secret set ProcellaDescopeManagementKey "${{ secrets.DESCOPE_MANAGEMENT_KEY }}" --stage "$STAGE"

      - name: Deploy
        run: npx sst deploy --stage pr-${{ github.event.number }}

      - name: Get stack outputs
        id: outputs
        run: |
          API=$(npx sst output api --stage pr-${{ github.event.number }} 2>/dev/null || echo "")
          APP=$(npx sst output app --stage pr-${{ github.event.number }} 2>/dev/null || echo "")
          DOCS=$(npx sst output docs --stage pr-${{ github.event.number }} 2>/dev/null || echo "")
          echo "api=$API" >> $GITHUB_OUTPUT
          echo "app=$APP" >> $GITHUB_OUTPUT
          echo "docs=$DOCS" >> $GITHUB_OUTPUT

  comment:
    name: PR Comment
    needs: [deploy]
    if: always() && needs.deploy.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/github-script@v8
        env:
          API_URL: ${{ needs.deploy.outputs.api_url }}
          APP_URL: ${{ needs.deploy.outputs.app_url }}
          DOCS_URL: ${{ needs.deploy.outputs.docs_url }}
          STAGE: pr-${{ github.event.number }}
        with:
          script: |
            const stage = process.env.STAGE;
            const lines = [
              '## Preview Environment\n',
              `**Stage:** \`${stage}\`\n`,
              '| Resource | URL |',
              '|---|---|',
            ];
            if (process.env.API_URL) lines.push(`| API | ${process.env.API_URL} |`);
            if (process.env.APP_URL) lines.push(`| App | ${process.env.APP_URL} |`);
            if (process.env.DOCS_URL) lines.push(`| Docs | ${process.env.DOCS_URL} |`);
            lines.push('');
            lines.push(`_Deployed via SST to \`us-east-1\`. Domains: \`*.${stage}.procella.sh\`_`);

            const marker = '## Preview Environment';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body?.startsWith(marker));
            const body = lines.join('\n');

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
