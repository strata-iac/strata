name: Preview Environment

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [main]

permissions:
  id-token: write
  contents: read
  pull-requests: write

concurrency:
  group: preview-${{ github.event.number }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy Preview
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: preview
    outputs:
      api_url: ${{ steps.outputs.outputs.api }}
      app_url: ${{ steps.outputs.outputs.app }}
      docs_url: ${{ steps.outputs.outputs.docs }}
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - uses: actions/cache@v5
        with:
          path: |
            node_modules
            ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile

      - name: Build Lambda binaries
        run: |
          mkdir -p .build/api .build/gc
          bun build --compile --target=bun-linux-x64 --bytecode --minify apps/server/src/lambda-bootstrap.ts --outfile .build/api/bootstrap
          bun build --compile --target=bun-linux-x64 --bytecode --minify apps/server/src/gc-bootstrap.ts --outfile .build/gc/bootstrap

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1
          role-session-name: GitHubActions-Preview-${{ github.run_id }}

      - name: Unlock stale state
        run: npx sst unlock --stage pr-${{ github.event.number }}
        continue-on-error: true

      - name: Deploy
        run: npx sst deploy --stage pr-${{ github.event.number }}
        env:
          SST_SECRET_ProcellaEncryptionKey: ${{ secrets.PROCELLA_ENCRYPTION_KEY }}
          SST_SECRET_ProcellaDevAuthToken: ${{ secrets.PROCELLA_DEV_AUTH_TOKEN }}
          SST_SECRET_ProcellaDescopeManagementKey: ${{ secrets.DESCOPE_MANAGEMENT_KEY }}

      - name: Create stage database and run migrations
        continue-on-error: true
        shell: bash {0}
        run: |
          set -x
          STAGE="pr-${{ github.event.number }}"
          DB_NAME="procella_${STAGE//-/_}"
          CLUSTER_ID=$(aws rds describe-db-clusters \
            --query "DBClusters[?starts_with(DBClusterIdentifier, 'procella')].DBClusterIdentifier | [0]" \
            --output text)
          echo "CLUSTER_ID=$CLUSTER_ID"
          if [ -z "$CLUSTER_ID" ] || [ "$CLUSTER_ID" = "None" ]; then
            echo "::warning::No Aurora cluster found — skipping database setup"
            exit 0
          fi
          CLUSTER_ARN=$(aws rds describe-db-clusters --db-cluster-identifier "$CLUSTER_ID" \
            --query "DBClusters[0].DBClusterArn" --output text)
          SECRET_ARN=$(aws rds describe-db-clusters --db-cluster-identifier "$CLUSTER_ID" \
            --query "DBClusters[0].MasterUserSecret.SecretArn" --output text)
          echo "CLUSTER_ARN=$CLUSTER_ARN"
          echo "SECRET_ARN=$SECRET_ARN"
          echo "DB_NAME=$DB_NAME"
          aws rds-data execute-statement \
            --resource-arn "$CLUSTER_ARN" \
            --secret-arn "$SECRET_ARN" \
            --database "postgres" \
            --sql "CREATE DATABASE \"$DB_NAME\"" 2>&1 || echo "Database may already exist"
          npx sst shell --stage "$STAGE" -- bun apps/server/src/index.ts --migrate

      - name: Get stack outputs
        id: outputs
        shell: bash {0}
        run: |
          STAGE="pr-${{ github.event.number }}"
          echo "api=https://api.${STAGE}.procella.cloud" >> $GITHUB_OUTPUT
          echo "app=https://app.${STAGE}.procella.cloud" >> $GITHUB_OUTPUT
          echo "docs=https://docs.${STAGE}.procella.cloud" >> $GITHUB_OUTPUT

  comment:
    name: PR Comment
    needs: [deploy]
    if: always() && needs.deploy.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
    steps:
      - uses: actions/github-script@v8
        env:
          API_URL: ${{ needs.deploy.outputs.api_url }}
          APP_URL: ${{ needs.deploy.outputs.app_url }}
          DOCS_URL: ${{ needs.deploy.outputs.docs_url }}
          STAGE: pr-${{ github.event.number }}
        with:
          script: |
            const stage = process.env.STAGE;
            const lines = [
              '## Preview Environment\n',
              `**Stage:** \`${stage}\`\n`,
              '| Resource | URL |',
              '|---|---|',
            ];
            if (process.env.API_URL) lines.push(`| API | ${process.env.API_URL} |`);
            if (process.env.APP_URL) lines.push(`| App | ${process.env.APP_URL} |`);
            if (process.env.DOCS_URL) lines.push(`| Docs | ${process.env.DOCS_URL} |`);
            lines.push('');
            lines.push(`_Deployed via SST to \`us-east-1\`. Domains: \`*.${stage}.procella.cloud\`_`);

            const marker = '## Preview Environment';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body?.startsWith(marker));
            const body = lines.join('\n');

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
