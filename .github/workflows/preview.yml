name: Preview Environment

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [main]

permissions:
  id-token: write
  contents: read
  pull-requests: write

concurrency:
  group: preview-${{ github.event.number }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy Preview
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: preview
    outputs:
      api_url: ${{ steps.outputs.outputs.api }}
      app_url: ${{ steps.outputs.outputs.app }}
      docs_url: ${{ steps.outputs.outputs.docs }}
      descope_project_id: ${{ steps.outputs.outputs.descope_project_id }}
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - uses: actions/cache@v5
        with:
          path: |
            node_modules
            ~/.bun/install/cache
            ~/.pulumi/plugins
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile

      - name: Build Lambda binaries
        run: |
          mkdir -p .build/cli-api .build/web-api .build/gc .build/migrate
          bun build --compile --target=bun-linux-x64 --production --sourcemap --compile-exec-argv="--smol" apps/server/src/lambda-cli.ts --outfile .build/cli-api/bootstrap
          bun build --compile --target=bun-linux-x64 --production --sourcemap --compile-exec-argv="--smol" apps/server/src/lambda-web.ts --outfile .build/web-api/bootstrap
          bun build --compile --target=bun-linux-x64 --production --sourcemap --compile-exec-argv="--smol" apps/server/src/gc-bootstrap.ts --outfile .build/gc/bootstrap
          bun build --compile --target=bun-linux-x64 --production --sourcemap --compile-exec-argv="--smol" apps/server/src/migrate-bootstrap.ts --outfile .build/migrate/bootstrap
          cp -rf packages/db/drizzle .build/migrate/drizzle

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1
          role-session-name: GitHubActions-Preview-${{ github.run_id }}

      - name: Unlock stale state
        run: npx sst unlock --stage pr-${{ github.event.number }}
        continue-on-error: true

      - name: Deploy
        id: deploy
        run: npx sst deploy --stage pr-${{ github.event.number }} | tee /tmp/sst-deploy.log
        env:
          GITHUB_TOKEN: ${{ github.token }}
          SST_SECRET_ProcellaEncryptionKey: ${{ secrets.PROCELLA_ENCRYPTION_KEY }}
          SST_SECRET_ProcellaDevAuthToken: ${{ secrets.PROCELLA_DEV_AUTH_TOKEN }}
          SST_SECRET_ProcellaDescopeManagementKey: ${{ secrets.DESCOPE_MANAGEMENT_KEY }}
          SST_SECRET_ProcellaOtelEndpoint: ${{ secrets.OTEL_EXPORTER_OTLP_ENDPOINT }}
          SST_SECRET_ProcellaOtelHeaders: ${{ secrets.OTEL_EXPORTER_OTLP_HEADERS }}

      - name: Get stack outputs
        id: outputs
        run: |
          STAGE="pr-${{ github.event.number }}"
          DESCOPE_ID=$(grep -oP 'descopeProjectId:\s*\K\S+' /tmp/sst-deploy.log | tail -1)
          echo "api=https://api.${STAGE}.procella.cloud" >> $GITHUB_OUTPUT
          echo "app=https://app.${STAGE}.procella.cloud" >> $GITHUB_OUTPUT
          echo "docs=https://docs.${STAGE}.procella.cloud" >> $GITHUB_OUTPUT
          echo "descope_project_id=${DESCOPE_ID}" >> $GITHUB_OUTPUT

  comment:
    name: PR Comment
    needs: [deploy]
    if: always() && needs.deploy.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
    steps:
      - uses: actions/github-script@v8
        env:
          API_URL: ${{ needs.deploy.outputs.api_url }}
          APP_URL: ${{ needs.deploy.outputs.app_url }}
          DOCS_URL: ${{ needs.deploy.outputs.docs_url }}
          STAGE: pr-${{ github.event.number }}
        with:
          script: |
            const stage = process.env.STAGE;
            const lines = [
              '## Preview Environment\n',
              `**Stage:** \`${stage}\`\n`,
              '| Resource | URL |',
              '|---|---|',
            ];
            if (process.env.API_URL) lines.push(`| API | ${process.env.API_URL} |`);
            if (process.env.APP_URL) lines.push(`| App | ${process.env.APP_URL} |`);
            if (process.env.DOCS_URL) lines.push(`| Docs | ${process.env.DOCS_URL} |`);
            lines.push('');
            lines.push(`_Deployed via SST to \`us-east-1\`. Domains: \`*.${stage}.procella.cloud\`_`);

            const marker = '## Preview Environment';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body?.startsWith(marker));
            const body = lines.join('\n');

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  integration-tests:
    name: Integration Tests (Deployed Preview)
    runs-on: ubuntu-latest
    needs: [deploy]
    if: needs.deploy.result == 'success' && needs.deploy.outputs.descope_project_id != ''
    permissions:
      id-token: write  # Required for GitHub Actions OIDC token
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - uses: actions/cache@v5
        with:
          path: |
            node_modules
            ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - uses: pulumi/setup-pulumi@v2
      - run: bun install --frozen-lockfile
      - name: Run integration tests against deployed preview
        env:
          PROCELLA_API_URL: ${{ needs.deploy.outputs.api_url }}
          PROCELLA_APP_URL: ${{ needs.deploy.outputs.app_url }}
          PROCELLA_DESCOPE_PROJECT_ID: ${{ needs.deploy.outputs.descope_project_id }}
          PROCELLA_DESCOPE_MANAGEMENT_KEY: ${{ secrets.DESCOPE_MANAGEMENT_KEY }}
          # Tenant name is procella-<stage> per infra/descope.ts
          PROCELLA_E2E_ORG_SLUG: procella-pr-${{ github.event.number }}
        run: bun run e2e:descope

  oidc-pulumi-deploy:
    name: OIDC Pulumi Deploy (real end-to-end)
    runs-on: ubuntu-latest
    needs: [deploy, integration-tests]
    if: needs.deploy.result == 'success' && needs['integration-tests'].result == 'success'
    permissions:
      id-token: write  # GitHub OIDC token
      contents: read
    env:
      PROCELLA_API_URL: ${{ needs.deploy.outputs.api_url }}
      ORG_SLUG: procella-pr-${{ github.event.number }}
      STACK_NAME: oidc-e2e-${{ github.run_id }}
      # Pulumi CLI reads PULUMI_BACKEND_URL for the service URL
      PULUMI_BACKEND_URL: ${{ needs.deploy.outputs.api_url }}
    steps:
      - uses: actions/checkout@v6
      - uses: pulumi/setup-pulumi@v2

      - uses: pulumi/auth-actions@v1
        with:
          organization: ${{ env.ORG_SLUG }}
          requested-token-type: urn:pulumi:token-type:access_token:organization
          cloud-url: ${{ env.PROCELLA_API_URL }}

      - name: Create stack + deploy + destroy
        run: |
          pulumi login --cloud-url "${PULUMI_BACKEND_URL}"
          cd examples/replace-triggers
          pulumi stack init "${ORG_SLUG}/${STACK_NAME}" --non-interactive
          pulumi up --yes --non-interactive
          pulumi destroy --yes --non-interactive
          pulumi stack rm --yes --non-interactive
