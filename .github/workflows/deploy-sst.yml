name: Deploy SST

on:
  workflow_call:
    inputs:
      stage:
        required: true
        type: string
      ref:
        required: false
        type: string
        default: ""

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy to AWS (${{ inputs.stage }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: ${{ inputs.stage }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Capture deployed ref
        id: meta
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - uses: jdx/mise-action@v4
      - uses: actions/cache@v5
        with:
          path: |
            node_modules
            ~/.bun/install/cache
            ~/.pulumi/plugins
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile

      - name: Build Lambda binaries
        run: |
          mkdir -p .build/cli-api .build/web-api .build/gc .build/migrate
          bun build --compile --target=bun-linux-x64 --production --sourcemap --compile-exec-argv="--smol" apps/server/src/lambda-cli.ts --outfile .build/cli-api/bootstrap
          bun build --compile --target=bun-linux-x64 --production --sourcemap --compile-exec-argv="--smol" apps/server/src/lambda-web.ts --outfile .build/web-api/bootstrap
          bun build --compile --target=bun-linux-x64 --production --sourcemap --compile-exec-argv="--smol" apps/server/src/gc-bootstrap.ts --outfile .build/gc/bootstrap
          bun build --compile --target=bun-linux-x64 --production --sourcemap --compile-exec-argv="--smol" apps/server/src/migrate-bootstrap.ts --outfile .build/migrate/bootstrap
          cp -rf packages/db/drizzle .build/migrate/drizzle

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1
          role-session-name: GitHubActions-Deploy-${{ inputs.stage }}-${{ github.run_id }}

      - name: Unlock stale state
        run: npx sst unlock --stage ${{ inputs.stage }}
        continue-on-error: true

      - name: Deploy
        run: npx sst deploy --stage ${{ inputs.stage }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
          SST_SECRET_ProcellaEncryptionKey: ${{ secrets.PROCELLA_ENCRYPTION_KEY }}
          SST_SECRET_ProcellaDevAuthToken: ${{ secrets.PROCELLA_DEV_AUTH_TOKEN }}
          SST_SECRET_ProcellaDescopeManagementKey: ${{ secrets.DESCOPE_MANAGEMENT_KEY }}
          SST_SECRET_ProcellaOtelEndpoint: ${{ secrets.OTEL_EXPORTER_OTLP_ENDPOINT }}
          SST_SECRET_ProcellaOtelHeaders: ${{ secrets.OTEL_EXPORTER_OTLP_HEADERS }}

      - name: Deployment summary
        if: always()
        run: |
          DOMAIN=${{ inputs.stage == 'production' && 'procella.cloud' || format('{0}.procella.cloud', inputs.stage) }}
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | \`${{ inputs.stage }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | \`${{ job.status }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Region | \`us-east-1\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ steps.meta.outputs.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Ref | \`${{ inputs.ref || 'default' }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**URLs:**" >> $GITHUB_STEP_SUMMARY
          echo "- API: https://api.${DOMAIN}" >> $GITHUB_STEP_SUMMARY
          echo "- App: https://app.${DOMAIN}" >> $GITHUB_STEP_SUMMARY
          echo "- Docs: https://docs.${DOMAIN}" >> $GITHUB_STEP_SUMMARY
