root = "."
tmp_dir = "tmp"

[build]
cmd = "go build -o ./tmp/strata ./cmd/strata"
bin = "./tmp/strata"
include_ext = ["go", "sql"]
exclude_dir = ["tmp", "web", "docs", "e2e", "node_modules", "data", ".git", ".dolt", ".beads"]
delay = 1000
kill_delay = 500
send_interrupt = true
stop_on_error = true
rerun = false

[log]
time = false
main_only = true

[color]
main = "cyan"
build = "yellow"
runner = "green"

[misc]
clean_on_exit = true
