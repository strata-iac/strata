codecov:
  require_ci_to_pass: true

coverage:
  status:
    project:
      default:
        target: auto
        informational: true
    patch:
      default:
        target: 80%
        threshold: 5%
        informational: false
        paths:
          - "!packages/migrate/**"
      migrate-cli:
        target: 50%
        threshold: 10%
        informational: true
        paths:
          - packages/migrate/**

flags:
  unit:
    paths:
      - packages/
      - apps/server/
      - apps/ui/
      - scripts/
    carryforward: true

component_management:
  individual_components:
    - component_id: packages
      name: Packages
      paths:
        - packages/**
        - "!packages/migrate/**"
    - component_id: migrate
      name: Migrate CLI
      paths:
        - packages/migrate/**
    - component_id: server
      name: Server
      paths:
        - apps/server/**
    - component_id: ui
      name: UI
      paths:
        - apps/ui/**

comment:
  layout: "condensed_header, condensed_files, condensed_footer"
  require_changes: true

ignore:
  - "e2e/**"
  - "bench/**"
  - "apps/docs/**"
  - "**/*.config.ts"
  - "**/generated/**"
  - "**/*.test.ts"
  - "**/*.spec.ts"
  - "packages/migrate/src/cli.ts"
  - "packages/migrate/src/log.ts"
  - "packages/migrate/src/discover.ts"
  - "packages/migrate/src/migrate.ts"
  - "packages/migrate/src/preflight.ts"
  - "packages/migrate/src/validate.ts"
