run:
  timeout: 5m

linters:
  enable:
    # bugs & correctness
    - errcheck
    - govet
    - staticcheck
    - bodyclose
    - durationcheck
    - errname
    - errorlint
    - makezero
    - nilerr
    - noctx
    - sqlclosecheck

    # style & consistency
    - gofumpt
    - goimports
    - revive
    - unconvert
    - unparam
    - usestdlibvars
    - wastedassign
    - whitespace
    - misspell

    # security
    - gosec

    # performance
    - prealloc

    # complexity
    - cyclop
    - gocognit
    - nestif

linters-settings:
  gofumpt:
    extra-rules: true

  revive:
    rules:
      - name: blank-imports
      - name: context-as-argument
      - name: context-keys-type
      - name: dot-imports
      - name: error-return
      - name: error-strings
      - name: error-naming
      - name: exported
        arguments:
          - "checkPrivateReceivers"
      - name: if-return
      - name: increment-decrement
      - name: var-naming
      - name: var-declaration
      - name: range
      - name: receiver-naming
      - name: time-naming
      - name: unexported-return
      - name: indent-error-flow
      - name: errorf
      - name: empty-block
      - name: superfluous-else
      - name: unused-parameter
      - name: unreachable-code
      - name: redefines-builtin-id

  cyclop:
    max-complexity: 20

  gocognit:
    min-complexity: 20

  nestif:
    min-complexity: 5

  gosec:
    excludes:
      - G104 # duplicate of errcheck
    config:
      global:
        audit: true

  errcheck:
    check-type-assertions: true
    check-blank: false

  govet:
    enable-all: true
    disable:
      - fieldalignment
      - shadow

  misspell:
    locale: US

  staticcheck:
    checks:
      - "all"

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-dirs:
    - vendor
  exclude-rules:
    # Test files can be more relaxed
    - path: _test\.go
      linters:
        - errcheck
        - gosec
        - cyclop
        - gocognit
    # Allow unused params in interface stubs/nop implementations
    - path: nop\.go
      linters:
        - unused-parameter
        - revive
