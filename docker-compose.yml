# Profiles: (none)=deps only, dev=single server, cluster=N replicas behind Caddy LB
x-procella: &procella
  build: .
  depends_on:
    postgres:
      condition: service_healthy
    minio:
      condition: service_healthy
    minio-init:
      condition: service_completed_successfully
    migrate:
      condition: service_completed_successfully
  environment: &procella-env
    PROCELLA_LISTEN_ADDR: ":9090"
    PROCELLA_DATABASE_URL: "postgres://procella:procella@postgres:5432/procella?sslmode=disable"
    PROCELLA_AUTH_MODE: dev
    # Use a non-secret placeholder here; copy to .env and replace for real use.
    PROCELLA_DEV_AUTH_TOKEN: CHANGE_ME_GENERATE_RANDOM_64_HEX
    PROCELLA_DEV_USER_LOGIN: dev-user
    PROCELLA_DEV_ORG_LOGIN: dev-org
    PROCELLA_DEV_USERS: '[{"token":"token-user-b","login":"user-b","org":"org-b","role":"admin"},{"token":"token-viewer","login":"viewer-user","org":"dev-org","role":"viewer"}]'
    # Generate via: openssl rand -hex 32 ; do not reuse across deployments.
    PROCELLA_ENCRYPTION_KEY: ${PROCELLA_ENCRYPTION_KEY:?must be set; generate with `openssl rand -hex 32`}
    # Placeholder only; generate a unique secret when enabling /cron/gc.
    PROCELLA_CRON_SECRET: CHANGE_ME_GENERATE_RANDOM_32_HEX
    PROCELLA_BLOB_BACKEND: s3
    PROCELLA_BLOB_S3_BUCKET: procella-checkpoints
    PROCELLA_BLOB_S3_ENDPOINT: http://minio:9000
    AWS_ACCESS_KEY_ID: minio
    AWS_SECRET_ACCESS_KEY: minio
  healthcheck: &procella-health
    test: ["CMD", "/procella", "--healthz"]
    interval: 5s
    timeout: 3s
    retries: 10

services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: procella
      POSTGRES_PASSWORD: procella
      POSTGRES_DB: procella
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U procella"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:RELEASE.2025-01-17T23-25-50Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/procella-checkpoints &&
      echo 'bucket ready'
      "
    restart: "no"

  procella:
    <<: *procella
    profiles: [dev]
    ports:
      - "9090:9090"

  procella-cluster:
    <<: *procella
    profiles: [cluster]
    deploy:
      replicas: 3

  migrate:
    build:
      context: .
      target: build
    profiles: [dev, cluster]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PROCELLA_DATABASE_URL: "postgres://procella:procella@postgres:5432/procella?sslmode=disable"
    entrypoint: ["bun", "drizzle-kit", "migrate", "--config", "packages/db/drizzle.config.ts"]
    restart: "no"

  procella-ui:
    build:
      context: .
      dockerfile: apps/ui/Dockerfile
    profiles: [cluster]
    depends_on:
      procella-cluster:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/ || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5

  caddy:
    image: caddy:2-alpine
    profiles: [cluster]
    depends_on:
      procella-cluster:
        condition: service_healthy
      procella-ui:
        condition: service_healthy
    ports:
      - "9090:9090"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro

volumes:
  postgres-data:
  minio-data:
