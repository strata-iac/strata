# Profiles: (none)=deps only, dev=single server, cluster=N replicas behind Caddy LB
x-strata: &strata
  build: .
  depends_on:
    postgres:
      condition: service_healthy
    minio:
      condition: service_healthy
    minio-init:
      condition: service_completed_successfully
  environment: &strata-env
    STRATA_LISTEN_ADDR: ":9090"
    STRATA_DATABASE_URL: "postgres://strata:strata@postgres:5432/strata?sslmode=disable"
    STRATA_AUTH_MODE: dev
    STRATA_DEV_AUTH_TOKEN: devtoken123
    STRATA_DEV_USER_LOGIN: dev-user
    STRATA_DEV_ORG_LOGIN: dev-org
    STRATA_DEV_USERS: '[{"token":"token-user-b","login":"user-b","org":"org-b","role":"admin"},{"token":"token-viewer","login":"viewer-user","org":"dev-org","role":"viewer"}]'
    STRATA_BLOB_BACKEND: s3
    STRATA_BLOB_S3_BUCKET: strata-checkpoints
    STRATA_BLOB_S3_ENDPOINT: http://minio:9000
    AWS_ACCESS_KEY_ID: minio
    AWS_SECRET_ACCESS_KEY: minio
  healthcheck: &strata-health
    test: ["CMD", "/strata", "healthcheck"]
    interval: 5s
    timeout: 3s
    retries: 10

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: strata
      POSTGRES_PASSWORD: strata
      POSTGRES_DB: strata
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U strata"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:RELEASE.2025-01-17T23-25-50Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/strata-checkpoints &&
      echo 'bucket ready'
      "
    restart: "no"

  strata:
    <<: *strata
    profiles: [dev]
    ports:
      - "9090:9090"

  strata-cluster:
    <<: *strata
    profiles: [cluster]
    deploy:
      replicas: 3

  caddy:
    image: caddy:2-alpine
    profiles: [cluster]
    depends_on:
      strata-cluster:
        condition: service_healthy
    ports:
      - "9090:9090"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro

volumes:
  postgres-data:
  minio-data:
