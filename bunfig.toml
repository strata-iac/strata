[install]
# Force hoisted install layout. Isolated install (the default in newer bun
# versions, opt-in via lockfile configVersion:1) places workspace deps in
# per-workspace node_modules, which breaks TypeScript project-reference
# .d.ts emit for packages with subscription procedures (TS2742 — see PR #144).
linker = "hoisted"

[test]
coverageReporter = ["text", "lcov"]
coverageDir = "coverage"
coverageSkipTestFiles = true
coveragePathIgnorePatterns = [
  "e2e/**",
  "bench/**",
  "**/*.config.ts",
  "**/generated/**",
  "apps/docs/**",
  "packages/test-utils/**",
]
